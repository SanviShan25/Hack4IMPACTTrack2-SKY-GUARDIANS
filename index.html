<!DOCTYPE html>
<html>
<head>
    <title>SKY GUARDIAN CONTROL DASHBOARD</title>

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body { font-family: Arial; margin: 0; }

        h1 {
            text-align: center;
            padding: 15px;
        }

        #map {
            height: 400px;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #f2f2f2;
        }

        button {
            margin: 10px;
            padding: 8px 12px;
        }
    </style>
</head>

<body>

<h1>🚀 SKY GUARDIAN CONTROL DASHBOARD</h1>

<div id="map"></div>

<h3>📊 Detected Data</h3>

<table id="dataTable">
    <tr>
        <th>Object</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Coordinates</th>
    </tr>
</table>

<button onclick="downloadCSV()">Download CSV</button>

<h3>📦 Supply Request</h3>
<input id="supplyInput" placeholder="Enter supplies (food, water, medicine)">
<button onclick="sendSupply()">Send Request</button>

<h3>🧭 Recommended Supplies</h3>
<div id="recommendations">No recommendations yet.</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([20.2961, 85.8245], 13);
let latestData = [];

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];

// ------------------------------
// FETCH DATA (MAIN FIX 🔥)
// ------------------------------
async function fetchData() {
    try {
        const res = await fetch("http://127.0.0.1:5000/data");
        const data = await res.json();

        console.log("DATA RECEIVED:", data); // DEBUG

        const table = document.getElementById("dataTable");

        table.innerHTML = `
            <tr>
                <th>Object</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Coordinates</th>
            </tr>
        `;

        data.forEach(item => {
            table.innerHTML += `
                <tr>
                    <td>${item.object}</td>
                    <td>${item.status}</td>
                    <td>${item.priority}</td>
                    <td>${item.coordinates}</td>
                </tr>
            `;
        });

    } catch (err) {
        console.log("❌ Error:", err);
    }
}

// AUTO REFRESH
setInterval(fetchData, 2000);

// RUN ON LOAD
fetchData();

// ------------------------------
// AUTO REFRESH (IMPORTANT)
// ------------------------------
setInterval(fetchData, 2000);

// Run once immediately
fetchData();


// ------------------------------
// CSV DOWNLOAD
// ------------------------------

async function downloadCSV() {
    try {
        const res = await fetch("http://127.0.0.1:5000/data");
        const data = await res.json();

        if (!data || data.length === 0) {
            alert("No data to download yet");
            return;
        }

        let csv = "Object,Status,Priority,Coordinates\n";

        data.forEach(item => {
            csv += `${item.object},${item.status},${item.priority},"${item.coordinates}"\n`;
        });

        // Create file
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "sky_guardian_data.csv";
        a.click();

        window.URL.revokeObjectURL(url);

    } catch (err) {
        console.log("❌ CSV Error:", err);
    }
}


// ------------------------------
// SUPPLY REQUEST
// ------------------------------
async function sendSupply() {
    const supply = document.getElementById("supplyInput").value;

    await fetch("http://127.0.0.1:5000/request_supply", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ supply })
    });

    alert("✅ Request Sent");
}
</script>
fetchData();

</body>
</html>
