<!DOCTYPE html>
<html>
<head>
    <title>SKY GUARDIAN CONTROL DASHBOARD</title>

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body { font-family: Arial; margin: 0; }

        h1 {
            text-align: center;
            padding: 15px;
        }

        #map {
            height: 400px;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #f2f2f2;
        }

        button {
            margin: 10px;
            padding: 8px 12px;
        }
    </style>
</head>

<body>

<h1>🚀 SKY GUARDIAN CONTROL DASHBOARD</h1>

<div id="map"></div>

<h3>📊 Detected Data</h3>

<table id="dataTable">
    <tr>
        <th>Object</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Coordinates</th>
    </tr>
</table>

<button onclick="downloadCSV()">Download CSV</button>

<h3>📦 Supply Request</h3>
<input id="supplyInput" placeholder="Enter supplies (food, water, medicine)">
<button onclick="sendSupply()">Send Request</button>

<h3>🧭 Recommended Supplies</h3>
<div id="recommendations">No recommendations yet.</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([20.2961, 85.8245], 13);
let latestData = [];

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];

// ------------------------------
// FETCH DATA (MAIN FIX 🔥)
// ------------------------------
async function fetchData() {
    try {
       const res = await fetch("http://127.0.0.1:5000/data", { method: 'GET', mode: 'cors' });
        console.log('FETCH STATUS', res.status, res.statusText, res.headers.get('Access-Control-Allow-Origin'));

        if (!res.ok) {
            throw new Error(`Fetch error: ${res.status} ${res.statusText}`);
        }

        const data = await res.json();

        console.log("DATA RECEIVED:", data);  // 👈 DEBUG

        const table = document.getElementById("dataTable");

        table.innerHTML = `
            <tr>
                <th>Object</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Coordinates</th>
            </tr>
        `;

        // Remove old markers
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        data.forEach(item => {
            const coordsText = Array.isArray(item.coordinates) ? item.coordinates.join(', ') : item.coordinates;

            table.innerHTML += `
                <tr>
                    <td>${item.object || 'unknown'}</td>
                    <td>${item.status || 'unknown'}</td>
                    <td>${item.priority || 'LOW'}</td>
                    <td>${coordsText}</td>
                </tr>
            `;

            const latitude = Number(item.latitude) || 20.2961;
            const longitude = Number(item.longitude) || 85.8245;

            let marker = L.marker([latitude, longitude])
                .addTo(map)
                .bindPopup(`${item.object || 'object'} - ${item.status || 'status'}`);

            markers.push(marker);
        });

        latestData = data;

        // recommendation logic
        const highPriority = data.filter(d => (d.priority || '').toUpperCase().includes('HIGH')).length;
        const medPriority = data.filter(d => (d.priority || '').toUpperCase().includes('MEDIUM')).length;

        let recommendation = 'No critical supply actions currently.';
        if (highPriority > 0) {
            recommendation = `🚨 High alert detected: ${highPriority} item(s). Recommend: medical kits, evacuation teams, emergency response.`;
        } else if (medPriority > 0) {
            recommendation = `⚠️ Medium alert detected: ${medPriority} item(s). Recommend: first aid kits, food/water packages, monitoring.`;
        }
        document.getElementById('recommendations').innerText = recommendation;

    } catch (err) {
        console.log("❌ Error:", err);
    }
}

// ------------------------------
// AUTO REFRESH (IMPORTANT)
// ------------------------------
setInterval(fetchData, 2000);

// Run once immediately
fetchData();


// ------------------------------
// CSV DOWNLOAD
// ------------------------------
function downloadCSV() {
    if (!latestData || latestData.length === 0) {
        alert('No data to download yet');
        return;
    }

    const header = ['Object', 'Status', 'Priority', 'Latitude', 'Longitude', 'Coordinates'];
    const rows = latestData.map(item => [
        item.object || '',
        item.status || '',
        item.priority || '',
        item.latitude || '',
        item.longitude || '',
        Array.isArray(item.coordinates) ? item.coordinates.join(' ') : (item.coordinates || '')
    ]);

    const csvContent = [header, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.setAttribute('download', 'sky_guardian_data.csv');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}


// ------------------------------
// SUPPLY REQUEST
// ------------------------------
async function sendSupply() {
    const supply = document.getElementById("supplyInput").value;

    await fetch("http://127.0.0.1:5000/request_supply", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ supply })
    });

    alert("✅ Request Sent");
}
</script>

</body>
</html>
