<!DOCTYPE html>
<html>
<head>
<title>SKY GUARDIAN</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background: url("dronebg.jpeg") no-repeat center center fixed;
    background-size: cover;
    color:white;
}

/* overlay */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    z-index:-1;
}

.nav{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}
.nav h2{color:#a78bfa;}

.header{text-align:center;}
.header h1{
    font-size:36px;
    background:linear-gradient(90deg,#a78bfa,#22d3ee);
    -webkit-background-clip:text;
    color:transparent;
}

.main{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    padding:20px 40px;
}

.video-box{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
}
.video-box img{
    width:100%;
    border-radius:10px;
}

.side{display:flex;flex-direction:column;gap:20px;}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:12px;
}

.alert{
    border:2px solid red;
    box-shadow:0 0 20px red;
}

#map{
    height:300px;
    border-radius:10px;
}

.table{
    margin:20px 40px;
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
}

th,td{padding:10px;}

button{
    background:#a78bfa;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

input{
    width:100%;
    padding:8px;
    margin-top:10px;
    border-radius:8px;
    border:none;
    background:#111;
    color:white;
}
</style>
</head>

<body>

<div class="nav">
<h2>🚀 SKY GUARDIAN</h2>
</div>

<div class="header">
<h1>AI Disaster Command Center</h1>
<p>Real-Time Monitoring System</p>
</div>

<div class="main">

<div class="video-box" id="videoContainer">
<h3>🎥 Live AI Feed</h3>
<img src="http://127.0.0.1:5001/video">
</div>

<div class="side">

<div class="card">
<h3>📊 Stats</h3>
<p>Total: <span id="total">0</span></p>
<p>Alerts: <span id="alerts">0</span></p>
<p>High Risk: <span id="high">0</span></p>
</div>

<div class="card">
<h3>🧠 AI Insight</h3>
<div id="aiBox"></div>
</div>

<div class="card">
<h3>📦 Supply</h3>
<input id="supplyInput">
<button onclick="sendSupply()">Send</button>
</div>

</div>
</div>

<div style="padding:20px 40px;">
<h3>🗺️ Live Map</h3>
<div id="map"></div>
</div>

<div class="table">
<h3>📊 Logs</h3>
<button onclick="downloadCSV()">Download CSV</button>
<table id="dataTable"></table>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map=L.map('map').setView([20.2961,85.8245],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[];

async function fetchData(){
let res=await fetch("http://127.0.0.1:5001/data");
let data=await res.json();

console.log(data); // debug

let high=0;
let table=document.getElementById("dataTable");
let videoBox=document.getElementById("videoContainer");

table.innerHTML="<tr><th>Object</th><th>Status</th><th>Priority</th></tr>";

markers.forEach(m=>map.removeLayer(m));
markers=[];

data.forEach(d=>{

if(d.priority==="HIGH") high++;

table.innerHTML+=`
<tr>
<td>${d.object}</td>
<td>${d.status}</td>
<td>${d.priority}</td>
</tr>`;

// ✅ REAL COORDINATES
let lat = d.latitude;
let lng = d.longitude;

markers.push(
L.marker([lat,lng]).addTo(map)
.bindPopup(`${d.object}<br>${d.status}<br>${d.priority}`)
);

});

// center map on latest detection
if(data.length>0){
let last=data[data.length-1];
map.setView([last.latitude,last.longitude],15);
}

document.getElementById("total").innerText=data.length;
document.getElementById("alerts").innerText=high;
document.getElementById("high").innerText=high;

// alert glow
if(high>0){
videoBox.classList.add("alert");
}else{
videoBox.classList.remove("alert");
}

// AI insight
let ai=document.getElementById("aiBox");

if(high>2){
ai.innerHTML="🚨 CRITICAL: Immediate rescue required";
}
else if(data.length>20){
ai.innerHTML="⚠️ Increased activity";
}
else{
ai.innerHTML="✅ Stable";
}
}

setInterval(fetchData,2000);
fetchData();

async function downloadCSV(){
const res=await fetch("http://127.0.0.1:5001/data");
const data=await res.json();

let csv="Object,Status,Priority\n";
data.forEach(d=>{
csv+=`${d.object},${d.status},${d.priority}\n`;
});

const blob=new Blob([csv]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="data.csv";
a.click();
}

async function sendSupply(){
let val=document.getElementById("supplyInput").value;
await fetch("http://127.0.0.1:5001/request_supply",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({supply:val})
});
alert("Sent");
}
</script>

</body>
</html>
